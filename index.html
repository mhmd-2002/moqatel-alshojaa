<!-- =========================================================
إضافة الوحدات الجديدة - قيادة قوة طريف / منظومة إدارة التدريب
طريقة الاستخدام: انسخ هذا المقطع بالكامل وضعه قبل وسم </body> في ملف index.html الحالي.
تم تصميمه كإضافة آمنة لا تغيّر الخلفيات أو التنسيقات أو الأكواد الأصلية.
========================================================= -->
<script id="turaif-new-units-safe-patch">
(function(){
  'use strict';

  var NEW_UNITS = [
    {id:'tank_battalion', name:'كتيبة الدبابات', icon:'🛡️', user:'tank', pass:'1234'},
    {id:'infantry_battalion', name:'كتيبة المشاة', icon:'🪖', user:'infantry', pass:'1234'},
    {id:'engineer_battalion', name:'كتيبة المهندسين', icon:'⚙️', user:'engineer', pass:'1234'},
    {id:'military_police', name:'الشرطة العسكرية', icon:'🚔', user:'mp', pass:'1234'},
    {id:'command_company', name:'سرية القيادة', icon:'🎖️', user:'command', pass:'1234'},
    {id:'operation_maintenance', name:'التشغيل والصيانة', icon:'🔧', user:'opsmaint', pass:'1234'}
  ];

  var OLD_NAMES = ['الصيانة','الإمداد','الامداد','النقل','الإشارة','الاشارة'];
  var OLD_IDS = ['maintenance','supply','transport','signal'];

  function unitById(id){ return NEW_UNITS.find(function(u){ return u.id === id || u.name === id; }); }
  function unitByName(name){ return NEW_UNITS.find(function(u){ return u.name === String(name||'').trim(); }); }
  function showToastSafe(msg){
    try{ if(typeof showToast === 'function') return showToast(msg); }catch(e){}
    try{ console.log(msg); }catch(e){}
  }

  /* 1) توسيع دوال أسماء الوحدات والتطبيع بدون حذف الدوال الأصلية */
  var oldUnitNameById = window.unitNameById;
  window.unitNameById = function(unitId){
    var found = unitById(unitId);
    if(found) return found.name;
    try{ if(typeof oldUnitNameById === 'function') return oldUnitNameById(unitId); }catch(e){}
    return unitId;
  };

  var oldNormalizeUnit = window.normalizeUnit;
  window.normalizeUnit = function(v){
    var s = String(v||'').trim();
    var found = unitByName(s) || unitById(s);
    if(found) return found.id;
    try{ if(typeof oldNormalizeUnit === 'function') return oldNormalizeUnit(v); }catch(e){}
    var map = {'الصيانة':'maintenance','الإمداد':'supply','الامداد':'supply','النقل':'transport','الإشارة':'signal','الاشارة':'signal'};
    return map[s] || s || 'maintenance';
  };
  window.normalizeUnitSafe = window.normalizeUnit;

  /* 2) إضافة الوحدات لأي مصفوفة وحدات موجودة في النظام */
  ['UNITS','units','systemUnits','mainUnits','ALL_UNITS','APP_UNITS'].forEach(function(key){
    try{
      if(Array.isArray(window[key])){
        NEW_UNITS.forEach(function(u){
          var exists = window[key].some(function(x){ return (x && (x.id === u.id || x.name === u.name)) || x === u.id || x === u.name; });
          if(!exists){
            if(typeof window[key][0] === 'string') window[key].push(u.id);
            else window[key].push({id:u.id,name:u.name,icon:u.icon,username:u.user,password:u.pass});
          }
        });
      }
    }catch(e){}
  });

  /* 3) إضافة الوحدات إلى قوائم الاختيار في النماذج */
  function patchSelects(){
    document.querySelectorAll('select').forEach(function(sel){
      var txt = sel.textContent || '';
      var looksLikeUnitSelect = /الصيانة|الإمداد|الامداد|النقل|الإشارة|الاشارة|الوحدة/.test(txt + ' ' + (sel.id||'') + ' ' + (sel.name||''));
      if(!looksLikeUnitSelect) return;
      NEW_UNITS.forEach(function(u){
        var exists = Array.from(sel.options).some(function(o){ return o.value === u.id || o.value === u.name || o.textContent.trim() === u.name; });
        if(!exists){
          var opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.name;
          sel.appendChild(opt);
        }
      });
    });
  }

  /* 4) تحديث النصوص التي تذكر الوحدات الأربع فقط */
  function patchUnitTexts(){
    var newText = 'الصيانة، الإمداد، النقل، الإشارة، كتيبة الدبابات، كتيبة المشاة، كتيبة المهندسين، الشرطة العسكرية، سرية القيادة، التشغيل والصيانة';
    document.querySelectorAll('p,small,span,div').forEach(function(el){
      if(el.children.length > 0) return;
      var t = el.textContent || '';
      if(t.indexOf('الوحدات: الصيانة، الإمداد، النقل، الإشارة') >= 0){
        el.textContent = t.replace('الوحدات: الصيانة، الإمداد، النقل، الإشارة','الوحدات: ' + newText);
      }else if(t.indexOf('الوحدات، الصيانة، الإمداد، النقل، الإشارة') >= 0){
        el.textContent = t.replace('الوحدات، الصيانة، الإمداد، النقل، الإشارة','الوحدات، ' + newText);
      }
    });
  }

  function setCardClick(card, unitId){
    card.onclick = function(){
      var candidates = [
        'openUnit','enterUnit','openUnitPanel','showUnit','goUnit','loginUnit',
        'openExamUnit','openExamsUnit','enterExamUnit','openTeacherUnit','openHealthUnit','openTrainingUnit','openWeatherUnit'
      ];
      for(var i=0;i<candidates.length;i++){
        var fn = window[candidates[i]];
        if(typeof fn === 'function'){
          try{ fn(unitId); return; }catch(e){}
        }
      }
      try{ localStorage.setItem('selectedUnit', unitId); }catch(e){}
      showToastSafe('تم اختيار: ' + window.unitNameById(unitId));
    };
  }

  function cloneUnitCard(template, unit){
    var c = template.cloneNode(true);
    c.removeAttribute('id');
    c.setAttribute('data-unit', unit.id);
    c.setAttribute('data-new-unit', '1');
    c.innerHTML = c.innerHTML
      .replace(/الصيانة|الإمداد|الامداد|النقل|الإشارة|الاشارة/g, unit.name)
      .replace(/maintenance|supply|transport|signal/g, unit.id);
    var h = c.querySelector('h3,h4,b');
    if(h) h.textContent = unit.name;
    var icon = c.querySelector('.icon,.unitIcon,.emoji');
    if(icon) icon.textContent = unit.icon;
    var hint = c.querySelector('.hint,small,p');
    if(hint && /اسم مستخدم|كلمة مرور|دخول|الوحدة|اختبار|ملفات|مواد|تدريب|صحية/.test(hint.textContent||'')){
      hint.textContent = hint.textContent;
    }
    var html = c.getAttribute('onclick') || '';
    if(html){
      OLD_IDS.forEach(function(oldId){ html = html.replace(new RegExp(oldId,'g'), unit.id); });
      OLD_NAMES.forEach(function(oldName){ html = html.replace(new RegExp(oldName,'g'), unit.name); });
      c.setAttribute('onclick', html);
    }else{
      setCardClick(c, unit.id);
    }
    return c;
  }

  /* 5) نسخ بطاقات الوحدات بنفس التصميم داخل أي شبكة وحدات موجودة */
  function patchUnitCards(){
    var grids = Array.from(document.querySelectorAll('.units-only-grid,.unitGrid,.grid,.panelGrid'));
    grids.forEach(function(grid){
      var cards = Array.from(grid.children).filter(function(ch){
        var t = ch.textContent || '';
        return OLD_NAMES.some(function(n){ return t.indexOf(n) >= 0; });
      });
      if(cards.length < 2) return;
      var template = cards[0];
      NEW_UNITS.forEach(function(u){
        var exists = Array.from(grid.children).some(function(ch){ return (ch.textContent||'').indexOf(u.name) >= 0 || ch.getAttribute('data-unit') === u.id; });
        if(!exists){ grid.appendChild(cloneUnitCard(template,u)); }
      });
    });
  }

  /* 6) بيانات دخول مبدئية للوحدات الجديدة إن كان النظام يستخدم قاموس دخول */
  function patchCredentials(){
    ['UNIT_CREDENTIALS','unitCredentials','loginUsers','users','UNIT_USERS'].forEach(function(key){
      try{
        if(window[key] && typeof window[key] === 'object' && !Array.isArray(window[key])){
          NEW_UNITS.forEach(function(u){
            if(!window[key][u.id]) window[key][u.id] = {username:u.user,password:u.pass,user:u.user,pass:u.pass,name:u.name};
          });
        }
      }catch(e){}
    });
  }

  function patchAll(){
    patchCredentials();
    patchSelects();
    patchUnitTexts();
    patchUnitCards();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', patchAll);
  else patchAll();

  var oldShowPage = window.showPage;
  if(typeof oldShowPage === 'function'){
    window.showPage = function(){
      var r = oldShowPage.apply(this, arguments);
      setTimeout(patchAll, 60);
      return r;
    };
  }

  setTimeout(patchAll, 300);
  setTimeout(patchAll, 1200);
})();
</script>
